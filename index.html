<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { 
            --neon-p: #ff00ff; 
            --neon-b: #00f2ff; 
            --bg-deep: #0a001a; 
        }
        
        body { 
            background: var(--bg-deep); color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 20px; overflow-x: hidden;
        } 

        /* HYPER-GLOW POZADIE */
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.15) 0%, transparent 40%),
                linear-gradient(180deg, #0a001a 0%, #1a0033 100%);
            z-index: -2;
        }

        /* SKENER ČIARA */
        .scan-line {
            position: fixed; top: -5px; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-b), transparent);
            box-shadow: 0 0 20px var(--neon-b), 0 0 10px white;
            z-index: 100; animation: scanning 4s infinite linear; pointer-events: none;
        }
        @keyframes scanning { 0% { top: -2%; } 100% { top: 102%; } } 

        /* ŠTATISTIKY */
        .stat-box { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 0, 255, 0.2); 
            border-radius: 22px; padding: 22px 5px; text-align: center;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.05);
        }
        .val { font-size: 32px; font-weight: 800; display: block; text-shadow: 0 0 12px currentColor; }
        .lab { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; margin-top: 6px; display: block; }
    </style>
</head>
<body> 
    <div class="scan-line"></div>
    <div class="animated-bg"></div>

    <div style="text-align:center; margin-bottom:30px;">
        <h1 style="color:var(--neon-b); text-shadow: 0 0 15px var(--neon-b);">AI ANALÝZA ZÁPASU</h1>
        <h2 style="font-size:24px;">{{DOMACI}} vs {{HOSTIA}}</h2>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="stat-box"><span class="val" style="color:#39ff14">{{P_OVER15}}%</span><span class="lab">Over 1.5</span></div>
        <div class="stat-box"><span class="val" style="color:var(--neon-b)">{{P_OVER25}}%</span><span class="lab">Over 2.5</span></div>
        <div class="stat-box"><span class="val" style="color:var(--neon-p)">{{P_BTTS}}%</span><span class="lab">BTTS</span></div>
        <div class="stat-box"><span class="val" style="color:#ffcc00">{{P_CORNERS}}</span><span class="lab">Rohy 7.5+</span></div>
    </div>

    <div style="margin-top:30px; padding:20px; background:rgba(0,242,255,0.05); border-radius:18px; border-left: 4px solid var(--neon-p);">
        <p style="margin:0; font-size:14px; line-height:1.6;">{{AI_TEXT}}</p>
    </div>
</body>
</html>
